trigger:
- main

pool: todoapp

stages:
- stage: MyFirstStage
  jobs:
  - job: BuildJob
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'
    - task: TerraformTask@5
      displayName: "Terraform init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_automation'
        backendServiceArm: 'practice'
        backendAzureRmResourceGroupName: 'rg-web'
        backendAzureRmStorageAccountName: 'bhumistg'
        backendAzureRmContainerName: 'mussorie'
        backendAzureRmKey: 'terraform.tfstate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_automation'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_automation'
        environmentServiceNameAzureRM: 'practice'

- stage: MySecondJob
  dependsOn: MyFirstStage
  jobs:
  - job: Terraformapply
    steps:
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_automation'
        backendServiceArm: 'practice'
        backendAzureRmResourceGroupName: 'rg-web'
        backendAzureRmStorageAccountName: 'bhumistg'
        backendAzureRmContainerName: 'mussorie'
        backendAzureRmKey: 'terraform.tfstate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/'
        environmentServiceNameAzureRM: 'practice'