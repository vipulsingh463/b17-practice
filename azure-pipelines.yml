trigger: 
- main 

pool: todoapp

steps:
- task: TerraformInstaller@1
  displayName: "Terraform install"
  inputs:
    terraformVersion: 'latest'
- task: TerraformTask@5
  displayName: "terraform init"
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_automation'
    backendServiceArm: 'practice'
    backendAzureRmResourceGroupName: 'rg-web'
    backendAzureRmStorageAccountName: 'bhumistg'
    backendAzureRmContainerName: 'mussorie'
    backendAzureRmKey: 'terraform.tfsate'
- task: TerraformTask@5
  displayName: "terraform validate"
  inputs:
    provider: 'azurerm'
    command: 'validate'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_automation'
- task: TerraformTask@5
  displayName: "terraform plan"
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Infra_automation'
    environmentServiceNameAzureRM: 'practice'